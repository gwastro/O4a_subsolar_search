[static_params]
f_final = 450

[variable_params]
q = 
tau0 =
spin1z =
spin2z =
lambda1_scale =
lambda2_scale =

[prior-spin1z]
name = uniform
min-spin1z = -0.05
max-spin1z = 0.05

[prior-spin2z]
name = uniform
min-spin2z = -0.05
max-spin2z = 0.05


[prior-lambda1_scale]
name = uniform_log10
min-lambda1_scale = 0.0001
max-lambda1_scale = 1


[prior-lambda2_scale]
name = uniform_log10
min-lambda2_scale = 0.0001
max-lambda2_scale = 1

[prior-tau0]
name = uniform
min-tau0 = 320.0
max-tau0 = 27650.0

[prior-q]
name = uniform
min-q = 1.0
max-q = 20.0


[waveform_transforms-mchirp]
name = custom
inputs = tau0
mchirp = mchirp_from_tau0(tau0, f_lower=15.0)

[waveform_transforms-mass1+mass2]
name = custom
inputs = mchirp, q
mass1 = mass1_from_mchirp_q(mchirp, q)
mass2 = mass2_from_mchirp_q(mchirp, q)

[waveform_transforms-lambda1]
name = custom
inputs = mass1, lambda1_scale
lambda1 = ((lambda1_scale * ((mass1 <= 0.53) * (305*mass1**(-5.71)) + (mass1 > 0.53) * 1e4)) <= 6e6) * (lambda1_scale * ((mass1 <= 0.53) * (305*mass1**(-5.71)) + (mass1 > 0.53) * 1e4)) \
        + ((lambda1_scale * ((mass1 <= 0.53) * (305*mass1**(-5.71)) + (mass1 > 0.53) * 1e4)) > 6e6) * 6e6

[waveform_transforms-lambda2]
name = custom
inputs = mass1, lambda2_scale
lambda2 = ((lambda2_scale * ((mass1 <= 0.53) * (305*mass1**(-5.71)) + (mass1 > 0.53) * 1e4)) <= 6e6) * (lambda2_scale * ((mass1 <= 0.53) * (305*mass1**(-5.71)) + (mass1 > 0.53) * 1e4)) \
        + ((lambda2_scale * ((mass1 <= 0.53) * (305*mass1**(-5.71)) + (mass1 > 0.53) * 1e4)) > 6e6) * 6e6

[constraint-1]
name = custom
constraint_arg = mass1 <= 2

[constraint-2]
name = custom
constraint_arg = mass2 <= 1

[constraint-3]
name = custom
constraint_arg = mass1 >= 0.1

[constraint-4]
name = custom
constraint_arg = mass2 >= 0.1
